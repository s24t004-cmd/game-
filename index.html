<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぷにっとリンク</title>
  <style>
    :root { --ink:#392d48; --cream:#fff8ed; --pink:#ff718d; --purple:#8e6ad8; --yellow:#ffd65c; --blue:#76d4ea; --mint:#74d7b2; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; overflow-x:hidden; font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif; color:var(--ink); background:radial-gradient(circle at 12% 12%,#fff 0 2px,transparent 3px) 0 0/30px 30px, linear-gradient(135deg,#ffdf8c,#f7a9c3 52%,#bca6ea); }
    .game { width:min(94vw,560px); margin:18px auto; padding:18px; border:5px solid #fff; border-radius:32px; background:rgba(255,248,237,.93); box-shadow:0 14px 0 rgba(83,47,97,.22),0 22px 40px rgba(83,47,97,.25); }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    h1 { margin:0; font-size:clamp(1.3rem,5vw,2rem); letter-spacing:.08em; color:#8d4bb5; text-shadow:1px 2px #fff; }
    .how { margin:0; font-size:.78rem; color:#765b78; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
    .stat { padding:8px 5px; text-align:center; border-radius:16px; background:#fff; box-shadow:0 3px 0 #eadde0; }
    .stat b { display:block; font-size:1.22rem; color:#8d4bb5; }
    .stat span { font-size:.7rem; color:#8a7187; }
    .board-wrap { position:relative; aspect-ratio:1; touch-action:none; user-select:none; }
    #board { position:absolute; inset:0; display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(7,1fr); gap:5px; padding:7px; border:5px solid #a67cce; border-radius:24px; background:linear-gradient(145deg,#7653ae,#a77bd5); box-shadow:inset 0 3px 8px rgba(49,19,81,.35); }
    #trail { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:4; overflow:visible; }
    .orb { position:relative; display:grid; place-items:center; padding:0; border:0; border-radius:50%; cursor:pointer; font-size:clamp(1.25rem,7vw,2.35rem); line-height:1; box-shadow:inset 0 -5px rgba(0,0,0,.12),0 3px 0 rgba(44,20,72,.2); transform:scale(1); transition:transform .12s, filter .12s; }
    .orb::after { content:""; position:absolute; width:24%; height:14%; border-radius:50%; background:rgba(255,255,255,.72); top:18%; left:20%; transform:rotate(-28deg); }
    .orb.selected { transform:scale(.84); filter:brightness(1.16); outline:3px solid white; }
    .orb.pop { animation:pop .25s both; }
    .c0 { background:var(--pink); } .c1 { background:var(--yellow); } .c2 { background:var(--blue); } .c3 { background:var(--mint); } .c4 { background:#bb93e8; }
    @keyframes pop { 55% { transform:scale(1.35) rotate(15deg); opacity:.75; } 100% { transform:scale(0); opacity:0; } }
    .footer { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-top:14px; }
    #message { min-height:1.2em; margin:0; color:#805785; font-size:.86rem; font-weight:700; }
    button.action { appearance:none; border:0; border-radius:999px; padding:10px 15px; color:#fff; background:#ff718d; box-shadow:0 4px 0 #cf536d; font:inherit; font-weight:700; cursor:pointer; }
    button.action:active { transform:translateY(3px); box-shadow:0 1px 0 #cf536d; }
    .screen { position:absolute; inset:0; z-index:8; display:none; place-items:center; padding:20px; border-radius:20px; text-align:center; background:rgba(67,43,99,.76); color:white; }
    .screen.show { display:grid; }
    .screen div { padding:24px; border-radius:24px; background:#fff8ed; color:var(--ink); box-shadow:0 6px 0 rgba(0,0,0,.18); }
    .screen h2 { margin:0 0 8px; color:#8d4bb5; } .screen p { margin:0 0 16px; }
    @media (max-width:380px) { .game { padding:12px; border-radius:24px; } #board { gap:3px; padding:5px; border-radius:18px; } .stats { gap:5px; } }
  </style>
</head>
<body>
  <main class="game">
    <header>
      <h1>ぷにっとリンク</h1>
      <p class="how">同じツムをなぞって<br>3個以上つなげよう！</p>
    </header>
    <section class="stats" aria-label="ゲーム状況">
      <div class="stat"><span>スコア</span><b id="score">0</b></div>
      <div class="stat"><span>のこり時間</span><b id="time">60</b></div>
      <div class="stat"><span>コンボ</span><b id="combo">0</b></div>
    </section>
    <div class="board-wrap" id="boardWrap">
      <div id="board" aria-label="ゲームボード"></div>
      <svg id="trail" aria-hidden="true"><polyline id="line" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".85" /></svg>
      <section class="screen show" id="startScreen"><div><h2>ぷにっとスタート！</h2><p>同じ顔を指でつないで消そう</p><button class="action" id="startBtn">ゲームをはじめる</button></div></section>
      <section class="screen" id="endScreen"><div><h2>タイムアップ！</h2><p>スコア <strong id="finalScore">0</strong></p><button class="action" id="retryBtn">もう一度あそぶ</button></div></section>
    </div>
    <footer class="footer"><p id="message">たくさんつなげるほど高得点！</p><button class="action" id="restartBtn">リスタート</button></footer>
  </main>
  <script>
    (() => {
      const icons = ['🐻','🐰','🐱','🐼','🐸'];
      const board = document.querySelector('#board'), wrap = document.querySelector('#boardWrap');
      const line = document.querySelector('#line'), scoreEl = document.querySelector('#score'), timeEl = document.querySelector('#time'), comboEl = document.querySelector('#combo'), message = document.querySelector('#message');
      const startScreen = document.querySelector('#startScreen'), endScreen = document.querySelector('#endScreen'), finalScore = document.querySelector('#finalScore');
      let cells = [], selected = [], active = false, score = 0, combo = 0, time = 60, timer;
      const rand = () => Math.floor(Math.random() * icons.length);
      function build() { board.innerHTML = ''; cells = Array.from({length:49}, (_, i) => { const b=document.createElement('button'); b.className=`orb c${rand()}`; b.dataset.type=b.textContent=icons[+b.className.match(/c(\d)/)[1]]; b.dataset.i=i; b.setAttribute('aria-label', b.textContent); board.append(b); return b; }); }
      function isNear(a,b) { const x=+a.dataset.i%7, y=Math.floor(+a.dataset.i/7), X=+b.dataset.i%7, Y=Math.floor(+b.dataset.i/7); return Math.abs(x-X)<=1 && Math.abs(y-Y)<=1; }
      function updateLine() { const r=wrap.getBoundingClientRect(); line.setAttribute('points', selected.map(c=>{const b=c.getBoundingClientRect();return `${b.left-r.left+b.width/2},${b.top-r.top+b.height/2}`}).join(' ')); }
      function choose(cell) { if (!active || selected.includes(cell)) return; if (selected.length && (cell.dataset.type !== selected[0].dataset.type || !isNear(selected.at(-1),cell))) return; selected.push(cell); cell.classList.add('selected'); updateLine(); }
      function clearPick() { selected.forEach(c=>c.classList.remove('selected')); selected=[]; line.setAttribute('points',''); }
      function release() { if (!active) return; if (selected.length >= 3) { const n=selected.length; combo++; score += n*n*10 + combo*5; scoreEl.textContent=score; comboEl.textContent=combo; message.textContent=`${n}こつないだ！ ${combo} コンボ！`; selected.forEach(c=>c.classList.add('pop')); const old=[...selected]; selected=[]; line.setAttribute('points',''); setTimeout(()=>old.forEach(c=>{c.className=`orb c${rand()}`;c.dataset.type=c.textContent=icons[+c.className.match(/c(\d)/)[1]];c.classList.remove('pop');}),250); } else { if(selected.length) message.textContent='3こ以上つなげてね'; combo=0; comboEl.textContent=combo; clearPick(); } }
      function point(e) { const p=e.touches ? e.touches[0] : e; return document.elementFromPoint(p.clientX,p.clientY)?.closest('.orb'); }
      wrap.addEventListener('pointerdown', e=>{ if(!active)return; e.preventDefault(); const c=point(e); if(c){clearPick();choose(c);} });
      wrap.addEventListener('pointermove', e=>{ if(selected.length) choose(point(e)); });
      window.addEventListener('pointerup', release); window.addEventListener('resize', updateLine);
      function start() { clearInterval(timer); build(); score=combo=0; time=60; scoreEl.textContent='0';comboEl.textContent='0';timeEl.textContent='60';message.textContent='たくさんつなげるほど高得点！'; startScreen.classList.remove('show');endScreen.classList.remove('show');active=true; timer=setInterval(()=>{time--;timeEl.textContent=time;if(time<=0){clearInterval(timer);active=false;clearPick();finalScore.textContent=score;endScreen.classList.add('show');}},1000); }
      document.querySelector('#startBtn').onclick=start; document.querySelector('#retryBtn').onclick=start; document.querySelector('#restartBtn').onclick=()=>{startScreen.classList.add('show');endScreen.classList.remove('show');clearInterval(timer);active=false;}; build();
    })();
  </script>
</body>
</html>
